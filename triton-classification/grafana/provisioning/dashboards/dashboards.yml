apiVersion: 1

providers:
  - name: 'default'                                  # Имя провайдера
    orgId: 1                                         # ID организации в Grafana
    folder: ''                                       # Папка (пусто = корень)
    type: file                                       # Тип источника — файлы
    disableDeletion: false                           # Разрешить удаление
    editable: true                                   # Разрешить редактирование в UI
    options:
      path: /etc/grafana/provisioning/dashboards     # Путь к JSON внутри контейнера